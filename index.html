<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="简约专业的个人简历单页网站，适合前端与技术岗位展示。"
    />
    <title>谢锦标-Blissen-个人简历</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="assets/main.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳转到主要内容</a>

    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="brand" href="#home" aria-label="返回首页">
          <span class="brand-mark">CV</span>
          <span class="brand-text">个人简历</span>
        </a>

        <button
          class="nav-toggle"
          id="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="打开导航菜单"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="主导航">
          <ul class="nav-list">
            <li><a class="nav-link is-active" href="#home">首页</a></li>
            <li><a class="nav-link" href="#about">关于我</a></li>
            <li><a class="nav-link" href="#experience">经历</a></li>
            <li><a class="nav-link" href="#projects">项目</a></li>
            <li><a class="nav-link" href="#skills">技能</a></li>
            <li><a class="nav-link" href="#contact">联系</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="hero-section" id="home" data-section="home">
        <div class="container hero-grid">
          <div class="hero-copy reveal">
            <p class="eyebrow">PERSONAL RESUME</p>
            <h1 class="hero-title" id="hero-name">加载中...</h1>
            <p class="hero-role" id="hero-role"></p>
            <p class="hero-summary" id="hero-summary"></p>

            <div class="hero-tags" id="hero-tags" aria-label="核心标签"></div>
            <div class="hero-metrics" id="hero-metrics" aria-label="核心亮点"></div>

            <div class="hero-actions">
              <a class="button button-primary" id="contact-action" href="#contact">联系我</a>
              <a class="button button-secondary" id="resume-action" href="assets/resume.pdf">下载简历</a>
            </div>
            <p class="hero-note" id="hero-note"></p>
          </div>

          <div class="hero-media reveal">
            <div class="photo-card">
              <div class="photo-glow"></div>
              <figure class="photo-frame">
                <img
                  id="hero-avatar"
                  src="assets/avatar-placeholder.svg"
                  alt="个人职业头像"
                />
              </figure>
              <div class="photo-caption">
                <p id="hero-location"></p>
                <p id="hero-availability"></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="content-section section-muted" id="about" data-section="about">
        <div class="container">
          <div class="section-heading reveal">
            <p class="eyebrow">ABOUT</p>
            <h2>关于我</h2>
            <p>以清晰表达、稳定交付和用户体验为导向的前端开发者形象展示。</p>
          </div>

          <div class="about-layout">
            <article class="panel reveal">
              <p class="about-text" id="about-text"></p>
              <dl class="facts-grid" id="about-facts"></dl>
            </article>

            <div class="highlights-grid" id="about-highlights"></div>
          </div>
        </div>
      </section>

      <section class="content-section" id="experience" data-section="experience">
        <div class="container">
          <div class="section-heading reveal">
            <p class="eyebrow">EXPERIENCE</p>
            <h2>经历</h2>
            <p>用时间线呈现工作经验、职责重点与技术沉淀。</p>
          </div>

          <div class="timeline" id="experience-list"></div>
        </div>
      </section>

      <section class="content-section section-muted" id="projects" data-section="projects">
        <div class="container">
          <div class="section-heading reveal">
            <p class="eyebrow">PROJECTS</p>
            <h2>项目</h2>
            <p>突出业务价值、技术栈与个人贡献，适合前端岗位筛选查看。</p>
          </div>

          <div class="cards-grid" id="projects-list"></div>
        </div>
      </section>

      <section class="content-section" id="skills" data-section="skills">
        <div class="container">
          <div class="section-heading reveal">
            <p class="eyebrow">SKILLS</p>
            <h2>技能</h2>
            <p>以分组标签方式快速展示技术宽度与实践侧重点。</p>
          </div>

          <div class="skills-grid" id="skills-groups"></div>
        </div>
      </section>

      <section class="content-section section-muted" id="contact" data-section="contact">
        <div class="container">
          <div class="section-heading reveal">
            <p class="eyebrow">CONTACT</p>
            <h2>联系</h2>
            <p>保留最核心的联络方式，便于投递、约面与进一步沟通。</p>
          </div>

          <div class="contact-panel panel reveal">
            <p class="contact-intro" id="contact-intro"></p>
            <div class="contact-list" id="contact-list"></div>
            <p class="contact-note" id="contact-note"></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p id="footer-note"></p>
      </div>
    </footer>

    <button
      class="back-to-top"
      id="back-to-top"
      type="button"
      aria-label="返回顶部"
      title="返回顶部"
    >
      ↑
    </button>

    <noscript>
      <div class="noscript-banner">
        当前页面依赖 JavaScript 渲染内容，请开启浏览器脚本后查看完整简历。
      </div>
    </noscript>
  </body>
</html>
